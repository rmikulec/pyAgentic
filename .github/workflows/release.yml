name: Continuous Delivery

on:
  push:
    branches:
      - 'main'
      - 'dev'
      - 'feat/**'
      - 'bug/**'
      - 'fix/**'


# default: least privileged permissions across all jobs
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false

    outputs:
      version:  ${{ steps.version.outputs.version }}
      released: ${{ steps.tag_check.outputs.exists == 'false' }}

    permissions:
      contents: write

    steps:
      - name: Setup | Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup | Force branch to workflow sha
        run: git reset --hard ${{ github.sha }}

      - name: Setup | Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup | Install uv
        uses: astral-sh/setup-uv@v6

      - name: Setup | Install dependencies
        run: uv sync --group dev

      - name: Build | Create distribution
        run: uv build

      - name: Version | Extract version from build
        id: version
        run: |
          VERSION=$(uv run python -c "from importlib.metadata import version; print(version('pyagentic-core'))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION"

      - name: Tag | Check if tag exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag | Create and push git tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Release | Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.version.outputs.version }}"
          generate_release_notes: true
          prerelease: ${{ github.ref_name != 'main' }}
          files: dist/*

      - name: Upload | Distribution Artifacts
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: distribution-artifacts
          path: dist
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.released == 'true' }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Setup | Download Build Artifacts
        uses: actions/download-artifact@v4
        id: artifact-download
        with:
          name: distribution-artifacts
          path: dist

      # see https://docs.pypi.org/trusted-publishers/
      - name: Publish | Upload to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          packages-dir: dist
          print-hash: true
          verbose: true
